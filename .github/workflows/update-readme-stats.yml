name: Update README cards

# Stats only include private repos when GH_PAT is set (classic PAT with `repo` scope).
# Create one at https://github.com/settings/tokens and add it as repo secret GH_PAT.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&bg_color=ffffff&title_color=1c1917&text_color=57534e&icon_color=78716c&hide=prs,issues&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=ffffff&title_color=1c1917&text_color=57534e&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
